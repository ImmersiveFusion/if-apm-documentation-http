# CANONICAL REDIRECT MAP (nginx). Generated from mkdocs.yml redirect_maps 2026-07-17.
#
# WHY THIS FILE EXISTS: every redirect currently served by this site returns HTTP 200
# (mkdocs-redirects emits meta-refresh HTML, never a real 301). Verified live on 22 URLs,
# zero 3xx. See DOC-SP-077. Google reads a 200 'this moved' page as live thin content
# competing with its own target, so ranking sits on the old path instead of passing.
#
# STATUS: PREPARED, NOT YET ACTIVE. Source of truth for the redirect layer once the docs
# App Service Plan moves to Linux (founder decision 2026-07-17).
#
# NOT YET WIRED: how this file is included depends on the Linux serving model, which is a
# platform decision (Friday, bus #1699) and is NOT made yet. Placing it without wiring it
# does nothing, which is exactly how src/web.config ended up dead in this repo.
#   built-in stack   -> startup script overwrites the Azure-managed nginx conf
#   custom startup   -> point the startup command at this file
#   custom container -> COPY this into the image
#
# CANONICAL DISCIPLINE (founder 2026-07-17, 'one has to be canonical'): once these are live
# and validated, the matching entries in mkdocs.yml redirect_maps become DEAD CONFIG THAT
# LOOKS LIVE, because the server redirect fires first and the meta-refresh page is never
# served. Strip them at that point. Until then mkdocs-redirects is the working FALLBACK.
# Do not run both as authorities.
#
# VALIDATION after cutover (expect 301 + a Location header, not 200):
#   curl -I https://docs.immersivefusion.com/copilot/
#   -> HTTP/1.1 301 ... Location: /DC/3D/Overview/ai-assistant/


# Source: https://github.com/squidfunk/mkdocs-material/blob/master/mkdocs.yml

# Project information
site_name: Immersive Fusion Docs
site_url: https://docs.immersivefusion.com
site_description: The next dimension of observability
site_author: Immersive Fusion LLC

# Repository
repo_name: Immersive Fusion Docs
repo_url: https://github.com/ImmersiveFusion/if-apm-documentation-http
edit_uri: edit/main/docs

# Copyright
copyright: Copyright &copy; 2020-2026 <a href="https://www.immersivefusion.com">Immersive Fusion LLC</a>, Maintained by the <a href="/contact/">Immersive Team</a>. Some content generation and supplementation using GPT through Azure OpenAI 

watch:
  - docs
  - overrides

# Configuration
theme:
  name: material
  custom_dir: overrides
  features:
    - announce.dismiss
    - content.action.edit
    - content.action.view
    - content.code.annotate
    - content.code.copy
    - content.code.select
    - content.tabs.link
    - content.tooltips
    # - header.autohide
    # - navigation.expand
    - navigation.footer
    - navigation.indexes
    #- navigation.instant
    #- navigation.instant.prefetch
    #- navigation.instant.progress
    #- navigation.prune
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - search.highlight
    # - search.share  # Disabled to prevent Google indexing ?q= URLs
    - search.suggest
    - toc.follow
    # - toc.integrate
  palette:
    # Dark mode first (default) - Futuristic cyberpunk theme
    - scheme: slate
      primary: black
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    # Light mode alternative
    - scheme: default
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  font:
    header: Josefin Sans # doesn't actually do anything, just for the record
    #text: Josefin Sans
    text: Roboto
    code: Roboto Mono
  favicon: assets/favicon.png
  # icon:
  #   logo: assets/logo
  logo: assets/logo.png

# Plugins
plugins:
  #- blog
  - search:
      separator: '[\s\u200b\-_,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
  - tags
  - awesome-pages
        #collapse_single_pages: false
  - section-index
  - glightbox:
      touchNavigation: true
      loop: false
      effect: zoom
      slide_effect: slide
      width: 100%
      height: auto
      zoomable: true
      draggable: true
  - git-revision-date-localized:
      enable_creation_date: true
      type: timeago
  - minify:
      minify_html: true
  - redirects:
      redirect_maps:
        # 'instrument/index.md' redirect removed - now a real page at Instrument/index.md
        # On case-insensitive filesystems (Windows/Azure), this causes zip duplicate conflicts

        # Restructure redirects - preserve old URLs
        # Analysis-and-Visualization → DC/3D / DC/Web
        'analysis-and-visualization/index.md': 'DC/3D/index.md'
        'analysis-and-visualization/3d-and-vr/index.md': 'DC/3D/index.md'
        'analysis-and-visualization/3d-and-vr/guides/index.md': 'DC/3D/Guides/index.md'
        'analysis-and-visualization/3d-and-vr/guides/installation/index.md': 'DC/3D/Guides/Installation/index.md'

# Dev config - fast rebuilds without slow plugins
# Usage: python -m mkdocs serve -f mkdocs.dev.yml
# Note: not using INHERIT because MkDocs 1.x merges plugin lists
# Keep in sync with: ../IF.Knowledge/src/nexus/IF.Knowledge.Nexus.Spa/mkdocs.dev.yml

site_name: Immersive Fusion Docs
site_url: https://docs.immersivefusion.com
site_description: The next dimension of observability
site_author: Immersive Fusion LLC

repo_name: Immersive Fusion Docs
repo_url: https://github.com/ImmersiveFusion/if-apm-documentation-http
edit_uri: edit/main/docs

copyright: Copyright &copy; 2020-2026 <a href="https://www.immersivefusion.com">Immersive Fusion LLC</a>, Maintained by the <a href="/contact/">Immersive Team</a>. Some content generation and supplementation using GPT through Azure OpenAI

watch:
  - docs
  - overrides

theme:
  name: material
  custom_dir: overrides
  features:
    - announce.dismiss
    - content.action.edit
    - content.action.view
    - content.code.annotate
    - content.code.copy
    - content.code.select
    - content.tooltips
    - navigation.footer
    - navigation.indexes
    - navigation.sections
    - navigation.tabs
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.suggest
    - toc.follow
  palette:
    - scheme: slate
      primary: black
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  font:
    header: Josefin Sans
    text: Roboto
    code: Roboto Mono
  favicon: assets/favicon.png
  logo: assets/logo.png

# Fast plugins only - no git-revision-date-localized, no minify
plugins:
  - search:
      separator: '[\s\u200b\-_,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
  - awesome-pages

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
      emoji_index: !!python/name:material.extensions.emoji.twemoji
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      normalize_issue_symbols: true
      repo_url_shorthand: true
      user: squidfunk
      repo: mkdocs-material
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets:
      auto_append:
        - includes/mkdocs.md
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      combine_header_slug: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - markdown_include.include:
      base_path: docs

extra_javascript: []
extra_css:
  - css/extra.css

extra:
  homepage: /
  annotate:
    json: [.s2]
